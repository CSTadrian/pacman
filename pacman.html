<!DOCTYPE html>
<html>
<head>
  <title>Pac-Man AI Game (GTM) - Ghost Image + Random O</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.4/dist/teachablemachine-image.min.js"></script>
  <style>
    body { text-align: center; background: #111; color: white; font-family: sans-serif; }
    canvas { background: black; display: block; margin: auto; }
    #directionDisplay { font-size: 2.5vw; margin-top: 10px; color: #0f0; }
    #info { margin-top: 10px; color: white; }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
</head>
<body>
  <h2>Pac-Man Controlled by AI Gestures</h2>
  <button id="startButton">Start Game</button>
  <div id="directionDisplay">Waiting for prediction...</div>
  <div id="info">
    <p id="scoreDisplay">Score: 0 | High Score: 0</p>
    <p id="timeDisplay">Time Left: 80s</p>
  </div>
  <video id="webcam" autoplay playsinline width="224" height="224" style="display:none;"></video>
  <canvas id="gameCanvas"></canvas>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/i0fcHolgt/";
    let model, webcam, ctx, canvas;

    // Map and tile
    const layout = [
      "UUUUUUUUUUUUUU",
      "U...G...G....U",
      "U.WWG.WWW..WWU",
      "U.W...WWW....U",
      "U.WW..WWW..WWU",
      "U.......G....U",
      "GGWWWWWWWWWWGG",
      "U.GG.........U",
      "U.WW...WWW..WU",
      "U.WW.....W..WU",
      "U.WW.GWW.W..WU",
      "U........G..WU",
      "UUUUUUUUUUUUUUU"
    ];

    let TILE_SIZE = 30; // will be adjusted to fit canvas
    let board = [];
    let rows = layout.length;
    let cols = layout[0].length;

    // Entities
    let pacman = { x: 1, y: 1 };
    let ghost = { x: 6, y: 5 }; // initial ghost position (adjustable)
    let ghostStart = { x: ghost.x, y: ghost.y };

    // Ghost image
    const ghostImage = new Image();
    ghostImage.src = "ghost.png"; // put ghost.png in same folder
    let ghostImageLoaded = false;
    ghostImage.onload = () => { ghostImageLoaded = true; };

    // Movement & timers
    let moveCooldown = 0;
    const MOVE_DELAY = 15;
    let ghostCooldown = 0;
    const GHOST_DELAY = 30; // ghost moves every 30 frames (slower)
    let powerMode = false;
    let powerTimerSeconds = 0; // real seconds for power mode

    // Game state
    let score = 0;
    let highestScore = localStorage.getItem("highestScore") || 0;
    let totalDots = 0;
    let timeLeft = 80;
    let gameOver = false;

    // Teachable Machine webcam
    async function initModelAndWebcam() {
      model = await tmImage.load(URL + "model.json", URL + "metadata.json");
      webcam = new tmImage.Webcam(224, 224, true);
      await webcam.setup();
      await webcam.play();
      webcam.canvas.style.display = "none";
      document.body.appendChild(webcam.canvas);
    }

    // Create board, convert to array, randomly pick 5 '.' -> 'O'
    function createBoard() {
      board = layout.map(row => row.split(""));

      // collect '.' positions
      const dotPositions = [];
      for (let y = 0; y < board.length; y++) {
        for (let x = 0; x < board[y].length; x++) {
          if (board[y][x] === ".") dotPositions.push({ x, y });
        }
      }

      // shuffle and pick up to 5
      for (let i = dotPositions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [dotPositions[i], dotPositions[j]] = [dotPositions[j], dotPositions[i]];
      }
      const pickCount = Math.min(5, dotPositions.length);
      for (let i = 0; i < pickCount; i++) {
        const p = dotPositions[i];
        board[p.y][p.x] = "O";
      }

      totalDots = board.flat().filter(cell => [".", "G", "O"].includes(cell)).length;
    }

    // Adjust canvas size to grid
    function setupCanvas() {
        canvas = document.getElementById("gameCanvas");
        ctx = canvas.getContext("2d");

        // use container width (screen width or wrapper width)
        const containerWidth = document.body.clientWidth;
        TILE_SIZE = Math.floor(containerWidth / cols);

        canvas.width = TILE_SIZE * cols;
        canvas.height = TILE_SIZE * rows;

        // make canvas responsive
        canvas.style.width = "100%";
        canvas.style.height = "auto";
    }



    async function init() {
      await initModelAndWebcam();
      createBoard();
      setupCanvas();
      drawGame();
      startTimer();
      window.requestAnimationFrame(loop);
    }

    // Game loop
    async function loop() {
      if (gameOver) return;
      webcam.update();
      const prediction = await model.predict(webcam.canvas);
      const highest = prediction.reduce((a, b) => a.probability > b.probability ? a : b);
      const direction = highest.className.toLowerCase();

      // show predicted label and power status
      document.getElementById("directionDisplay").innerText =
        `Predicted: ${direction}` + (powerMode ? ` | POWER ${powerTimerSeconds}s` : "");

      if (moveCooldown <= 0) {
        movePacman(direction);
        moveCooldown = MOVE_DELAY;
      } else moveCooldown--;

      moveGhost();
      checkCollision();

      drawGame();
      window.requestAnimationFrame(loop);
    }

    // Pac-Man movement and eating
    function movePacman(direction) {
      if (direction === "stop") return;

      let dx = 0, dy = 0;
      if (direction === "up") dy = -1;
      if (direction === "down") dy = 1;
      if (direction === "left") dx = -1;
      if (direction === "right") dx = 1;

      const newX = pacman.x + dx;
      const newY = pacman.y + dy;

      if (!board[newY] || !board[newY][newX]) return;
      const target = board[newY][newX];
      if (target === "W" || target === "U") return;

      pacman.x = newX;
      pacman.y = newY;

      if ([".", "G", "O"].includes(target)) {
        if (target === ".") score += 5;
        else if (target === "G") score += 25;
        else if (target === "O") {
          score += 50;
          powerMode = true;
          powerTimerSeconds = 300; // 5 minutes in seconds
        }
        board[newY][newX] = " ";
        totalDots--;
      }
    }

    // Ghost movement: only into ".", "G", or "O"; consumes pellet if present
    function moveGhost() {
      if (ghostCooldown > 0) {
        ghostCooldown--;
        return;
      }
      ghostCooldown = GHOST_DELAY;

      // shuffle directions
      const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
      for (let i = dirs.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
      }

      for (const [dx, dy] of dirs) {
        const nx = ghost.x + dx;
        const ny = ghost.y + dy;
        if (!board[ny] || !board[ny][nx]) continue;
        const t = board[ny][nx];
        if (t === "." || t === "G" || t === "O") {
          // move ghost into that tile and consume pellet if any
          ghost.x = nx;
          ghost.y = ny;
          if (t === "." || t === "G" || t === "O") {
            // ghost eats the pellet (so player cannot later)
            board[ny][nx] = " ";
            totalDots = Math.max(0, totalDots - 1);
          }
          return;
        }
      }
      // if no edible neighbor, ghost stays
    }

    // Collision handling
    function checkCollision() {
      if (pacman.x === ghost.x && pacman.y === ghost.y) {
        if (powerMode) {
          // Pac-Man eats ghost
          score += 200;
          ghost.x = ghostStart.x;
          ghost.y = ghostStart.y;
          powerMode = false;
          powerTimerSeconds = 0;
        } else {
          gameOver = true;
          updateHighestScore();
          setTimeout(() => alert("👻 Ghost caught you! Game Over."), 50);
        }
      }
    }

    // Drawing
    function drawGame() {
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < board.length; y++) {
        for (let x = 0; x < board[y].length; x++) {
          const tile = board[y][x];
          const px = x * TILE_SIZE;
          const py = y * TILE_SIZE;

          if (tile === "W") {
            ctx.fillStyle = "#4169E1"; // Royal Blue
            const margin = TILE_SIZE * 0.1; // 20% smaller on each side
            ctx.fillRect(px + margin, py + margin, TILE_SIZE - 2*margin, TILE_SIZE - 2*margin);
          }else if (tile === "U") {
            ctx.fillStyle = "#4169E1";
            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            ctx.strokeStyle = "cyan";
            ctx.lineWidth = 2;
            ctx.strokeRect(px, py, TILE_SIZE, TILE_SIZE);
          } else if (tile === ".") {
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(px + TILE_SIZE / 2, py + TILE_SIZE / 2, Math.max(3, TILE_SIZE * 0.08), 0, 2 * Math.PI);
            ctx.fill();
          } else if (tile === "G") {
            ctx.fillStyle = "green";
            ctx.beginPath();
            ctx.arc(px + TILE_SIZE / 2, py + TILE_SIZE / 2, Math.max(5, TILE_SIZE * 0.12), 0, 2 * Math.PI);
            ctx.fill();
          } else if (tile === "O") {
            ctx.fillStyle = "orange";
            ctx.beginPath();
            ctx.arc(px + TILE_SIZE / 2, py + TILE_SIZE / 2, Math.max(6, TILE_SIZE * 0.16), 0, 2 * Math.PI);
            ctx.fill();
          }
        }
      }

      // draw Pac-Man
      ctx.fillStyle = "yellow";
      ctx.beginPath();
      ctx.arc(pacman.x * TILE_SIZE + TILE_SIZE / 2, pacman.y * TILE_SIZE + TILE_SIZE / 2, TILE_SIZE / 2, 0.2 * Math.PI, 1.8 * Math.PI);
      ctx.lineTo(pacman.x * TILE_SIZE + TILE_SIZE / 2, pacman.y * TILE_SIZE + TILE_SIZE / 2);
      ctx.fill();

      // draw ghost image if loaded, else fallback circle
      const gx = ghost.x * TILE_SIZE;
      const gy = ghost.y * TILE_SIZE;
      if (ghostImageLoaded) {
        // draw image centered in tile and scaled to tile size
        ctx.drawImage(ghostImage, gx, gy, TILE_SIZE, TILE_SIZE);
      } else {
        ctx.font = `${TILE_SIZE}px sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("👻", ghost.x*TILE_SIZE+TILE_SIZE/2, ghost.y*TILE_SIZE+TILE_SIZE/2);
      }

      updateHighestScore();
      document.getElementById("timeDisplay").textContent = "Time Left: " + timeLeft + "s";

      if (!gameOver && totalDots === 0) {
        gameOver = true;
        const bonus = timeLeft * 3;
        score += bonus;
        updateHighestScore();
        setTimeout(() => {
          alert(`🎉 You Win! Final Score: ${score} (+${bonus} bonus)`);
        }, 100);
      }
    }

    function updateHighestScore() {
      if (score > highestScore) {
        highestScore = score;
        localStorage.setItem("highestScore", highestScore);
      }
      document.getElementById("scoreDisplay").textContent = `Score: ${score} | High Score: ${highestScore}`;
    }

    // Timer: decrements timeLeft and powerTimerSeconds in real seconds
    function startTimer() {
      const timer = setInterval(() => {
        if (gameOver) {
          clearInterval(timer);
          return;
        }
        timeLeft--;
        if (powerMode && powerTimerSeconds > 0) {
          powerTimerSeconds--;
          if (powerTimerSeconds <= 0) {
            powerMode = false;
            powerTimerSeconds = 0;
          }
        }
        if (timeLeft <= 0) {
          gameOver = true;
          updateHighestScore();
          alert("⏰ Time's up! Final Score: " + score);
          clearInterval(timer);
        }
      }, 1000);
    }

    window.onload = () => {
      createBoard();
      setupCanvas();
      drawGame(); // render maze and pellets right away
    };

    // redraw whenever the window size changes
    window.addEventListener("resize", () => {
    setupCanvas();
    drawGame();
    });

    // Start
    document.getElementById("startButton").addEventListener("click", async () => {
      await initModelAndWebcam(); // load Teachable Machine + webcam
      startTimer();
      window.requestAnimationFrame(loop);
      document.getElementById("startButton").style.display = "none"; // hide button
    });

  </script>
</body>
</html>
